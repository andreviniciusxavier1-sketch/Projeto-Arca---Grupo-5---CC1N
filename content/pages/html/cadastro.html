                <h2>bem vindo<br> abordo!</h2>
                <p class="sub1">Crie sua conta e faça parte da<br>ARCA!</p>
            </div>

                    <input id="senha2" type="password" name="senha" placeholder="Repita a Senha">
                    <div class="loginforminput2">
                        <input id="lembrar" type="checkbox">
                        <label for="lembrar" id="lembrarlabel">Lembrar de mim</label>
                    </div>
                </div>
            </div>
            <div class="loginformbtn">
                <button>Entrar</button>
                <a href="./login.html">Já tem conta? Faça o Login!</a>
